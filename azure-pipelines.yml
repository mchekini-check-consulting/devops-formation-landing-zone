# =============================================================================
# azure-pipelines.yml — CI/CD Landing Zone Azure Terraform
# =============================================================================
#
# EXTENSIONS MARKETPLACE À INSTALLER (une seule fois par organisation)
# ─────────────────────────────────────────────────────────────────────
#  1. Terraform (ms-devlabs)  → marketplace.visualstudio.com/items?itemName=ms-devlabs.custom-terraform-tasks
#     Fournit : TerraformInstaller@1  et  TerraformTaskV4@4
#
#  2. Checkov (Bridgecrew)    → marketplace.visualstudio.com/items?itemName=Bridgecrew.checkov
#     Fournit : Checkov@1
#
# PRÉ-REQUIS AZURE DEVOPS
# ─────────────────────────────────────────────────────────────────────
#  - Variable Group "terraform-backend"  → TF_BACKEND_RG, TF_BACKEND_SA,
#                                          TF_BACKEND_CONTAINER, TF_BACKEND_KEY
#  - Variable Group "infracost-secrets"  → INFRACOST_API_KEY  (secret)
#  - Service Connection                  → sp-landing-zone-sub  (Azure RM)
#  - Environment "prod"                  → avec Approval check configurée
#  - "Allow scripts to access OAuth token" activé sur le pipeline
# =============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**.md'
      - 'docs/**'

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**.md'
      - 'docs/**'

# =============================================================================
# VARIABLES
# =============================================================================
variables:
  - group: terraform-backend
  - group: infracost-secrets

  - name: TF_VERSION
    value: '1.7.5'

  - name: TFLINT_VERSION
    value: '0.50.3'

  - name: TFSEC_VERSION
    value: '1.28.6'

  - name: azureServiceConnection
    value: 'sp-landing-zone-sub'

  - name: TF_IN_AUTOMATION
    value: 'true'

  - name: TF_CLI_ARGS
    value: '-no-color'


# =============================================================================
# STAGE 1 — VALIDATE
# =============================================================================
stages:

- stage: Validate
  displayName: 'Validate — fmt + validate'
  jobs:

  # ── fmt check ──────────────────────────────────────────────────────────────
  - job: FmtCheck
    displayName: 'terraform fmt -check'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self

    # Installe la version exacte de Terraform (extension ms-devlabs)
    - task: TerraformInstaller@1
      displayName: 'Installer Terraform $(TF_VERSION)'
      inputs:
        terraformVersion: '$(TF_VERSION)'

    # fmt est purement local — pas de credentials Azure requis
    - script: terraform fmt -check -recursive -diff
      displayName: 'terraform fmt -check -recursive'
      workingDirectory: '$(System.DefaultWorkingDirectory)'

  # ── validate ───────────────────────────────────────────────────────────────
  - job: TfValidate
    displayName: 'terraform validate'
    dependsOn: FmtCheck
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: 'Installer Terraform $(TF_VERSION)'
      inputs:
        terraformVersion: '$(TF_VERSION)'

    # init/validate sont purement locaux — pas de credentials Azure requis
    - script: terraform init -backend=false -input=false
      displayName: 'terraform init -backend=false'
      workingDirectory: '$(System.DefaultWorkingDirectory)'

    - script: terraform validate
      displayName: 'terraform validate'
      workingDirectory: '$(System.DefaultWorkingDirectory)'


# =============================================================================
# STAGE 2 — SECURITY  (3 jobs parallèles)
# =============================================================================
- stage: Security
  displayName: 'Security — tflint + tfsec + checkov'
  dependsOn: Validate
  condition: succeeded()
  jobs:

  # ── TFLint ─────────────────────────────────────────────────────────────────
  # Pas de task marketplace fiable — installation via script officiel
  - job: TFLint
    displayName: 'tflint (plugin azurerm)'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self

    - bash: |
        set -e
        curl -sLo /tmp/tflint.zip \
          "https://github.com/terraform-linters/tflint/releases/download/v$(TFLINT_VERSION)/tflint_linux_amd64.zip"
        unzip -q /tmp/tflint.zip -d /usr/local/bin
        chmod +x /usr/local/bin/tflint
        tflint --version
        tflint --init
        tflint --recursive --format compact
      displayName: 'tflint --recursive'
      workingDirectory: '$(System.DefaultWorkingDirectory)'

  # ── TFSec ──────────────────────────────────────────────────────────────────
  - job: TFSec
    displayName: 'tfsec'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self

    - bash: |
        set -e
        curl -sLo /usr/local/bin/tfsec \
          "https://github.com/aquasecurity/tfsec/releases/download/v$(TFSEC_VERSION)/tfsec-linux-amd64"
        chmod +x /usr/local/bin/tfsec
        tfsec . --format lovely --include-passed --minimum-severity MEDIUM
      displayName: 'tfsec .'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      continueOnError: true

  # ── Checkov ────────────────────────────────────────────────────────────────
  # Utilise la task officielle Bridgecrew (extension : Bridgecrew.checkov)
  - job: Checkov
    displayName: 'checkov'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self

    # Task marketplace Bridgecrew — remplace le pip install + script
    # softFail: true → affiche les résultats sans bloquer le pipeline
    # Passer softFail à false quand le baseline sécurité est stabilisé
    - script: |
        pip install checkov --quiet
        checkov -d . --framework terraform --compact --soft-fail
      displayName: 'Checkov IaC scan'


# =============================================================================
# STAGE 3 — INFRACOST  (PR uniquement)
# =============================================================================
- stage: Infracost
  displayName: 'Infracost — diff coût (PR only)'
  dependsOn: Security
  condition: |
    and(
      succeeded(),
      eq(variables['Build.Reason'], 'PullRequest')
    )
  jobs:

  - job: InfracostDiff
    displayName: 'Diff coût Azure'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self
      fetchDepth: 0

    - bash: |
        set -e
        curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
        infracost --version
      displayName: 'Installer Infracost'

    - bash: |
        set -e
        git fetch origin main:refs/remotes/origin/main
        mkdir -p /tmp/infracost-baseline
        git --work-tree=/tmp/infracost-baseline checkout origin/main -- .
        infracost breakdown \
          --path /tmp/infracost-baseline \
          --format json \
          --out-file /tmp/infracost-base.json
      displayName: 'Baseline coût (branche main)'
      env:
        INFRACOST_API_KEY: $(INFRACOST_API_KEY)

    - bash: |
        set -e
        infracost diff \
          --path . \
          --compare-to /tmp/infracost-base.json \
          --format json \
          --out-file /tmp/infracost-diff.json
        infracost output --path /tmp/infracost-diff.json --format table
      displayName: 'Diff Infracost PR vs main'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      env:
        INFRACOST_API_KEY: $(INFRACOST_API_KEY)

    - bash: |
        set -e
        infracost comment github \
          --path /tmp/infracost-diff.json \
          --github-token "$(GITHUB_TOKEN)" \
          --pull-request "$(System.PullRequest.PullRequestNumber)" \
          --repo-url "$(Build.Repository.Uri)" \
          --behavior update
      displayName: 'Commenter Infracost sur la PR'
      env:
        INFRACOST_API_KEY: $(INFRACOST_API_KEY)
        GITHUB_TOKEN: $(GITHUB_TOKEN)


# =============================================================================
# STAGE 4 — PLAN
# =============================================================================
- stage: Plan
  displayName: 'Terraform Plan'
  dependsOn: Security
  condition: succeeded()
  jobs:

  - job: TerraformPlan
    displayName: 'terraform init + plan'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: 'Installer Terraform $(TF_VERSION)'
      inputs:
        terraformVersion: '$(TF_VERSION)'

    # TerraformTaskV4 init : la Service Connection gère l'auth du backend
    # Les inputs backendAzureRm* remplacent les -backend-config dans le script précédent
    - task: TerraformTaskV4@4
      displayName: 'terraform init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
        backendServiceArm: '$(azureServiceConnection)'
        backendAzureRmResourceGroupName: '$(TF_BACKEND_RG)'
        backendAzureRmStorageAccountName: '$(TF_BACKEND_SA)'
        backendAzureRmContainerName: '$(TF_BACKEND_CONTAINER)'
        backendAzureRmKey: '$(TF_BACKEND_KEY)'
        commandOptions: '-input=false'

    # Kubeconfig nécessaire pour le provider Helm (module platform)
    # Seul endroit où AzureCLI@2 reste — pas de task marketplace pour az aks get-credentials
    - task: AzureCLI@2
      displayName: 'Configurer kubeconfig AKS (provider Helm)'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          AKS_RG=$(az aks list --query "[0].resourceGroup" -o tsv 2>/dev/null || true)
          AKS_NAME=$(az aks list --query "[0].name" -o tsv 2>/dev/null || true)
          if [ -n "$AKS_RG" ] && [ -n "$AKS_NAME" ]; then
            az aks get-credentials --resource-group "$AKS_RG" --name "$AKS_NAME" --overwrite-existing
            echo "✔ Kubeconfig configuré : $AKS_NAME"
          else
            echo "⚠ Aucun cluster AKS trouvé"
          fi

    # TerraformTaskV4 plan : environmentServiceNameAzureRM gère l'auth du provider azurerm
    # Remplace complètement le AzureCLI@2 + export ARM_* précédent
    - task: TerraformTaskV4@4
      displayName: 'terraform plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)'
        environmentServiceNameAzureRM: '$(azureServiceConnection)'
        commandOptions: '-input=false -out=tfplan.binary'

    # Commentaire PR — pas de task marketplace pour l'API Git Azure DevOps
    - bash: |
        set -e
        PLAN_CONTENT=$(head -c 60000 $(System.DefaultWorkingDirectory)/tfplan.txt 2>/dev/null || terraform show -no-color tfplan.binary | head -c 60000)
        COMMENT=$(cat <<MARKDOWN
        ## Terraform Plan — \`$(Build.SourceBranchName)\`
        > Run : [#$(Build.BuildNumber)]($(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId))

        <details><summary>📋 Plan complet</summary>

        \`\`\`
        ${PLAN_CONTENT}
        \`\`\`

        </details>

        > ⏳ Apply déclenché après merge sur \`main\` + approbation manuelle dans l'Environment **prod**.
        MARKDOWN
        )
        PAYLOAD=$(jq -n --arg c "$COMMENT" \
          '{comments:[{parentCommentId:0,content:$c,commentType:1}],status:1}')
        curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
          -X POST \
          -H "Authorization: Bearer $(System.AccessToken)" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "$(System.CollectionUri)$(System.TeamProject)/_apis/git/repositories/$(Build.Repository.ID)/pullRequests/$(System.PullRequest.PullRequestId)/threads?api-version=7.0"
      displayName: 'Commenter le plan sur la PR'
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))

    - publish: '$(System.DefaultWorkingDirectory)/tfplan.binary'
      artifact: 'terraform-plan'
      displayName: 'Publier artifact tfplan.binary'


# =============================================================================
# STAGE 5 — APPLY  (main uniquement + gate manuelle via Environment prod)
# =============================================================================
- stage: Apply
  displayName: 'Terraform Apply — prod (gate manuelle)'
  dependsOn: Plan
  condition: |
    and(
      succeeded(),
      eq(variables['Build.SourceBranch'], 'refs/heads/main'),
      ne(variables['Build.Reason'], 'PullRequest')
    )
  jobs:

  - deployment: TerraformApply
    displayName: 'terraform apply'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'prod'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Installer Terraform $(TF_VERSION)'
            inputs:
              terraformVersion: '$(TF_VERSION)'

          - download: current
            artifact: 'terraform-plan'
            displayName: 'Télécharger tfplan.binary'

          - task: TerraformTaskV4@4
            displayName: 'terraform init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              backendServiceArm: '$(azureServiceConnection)'
              backendAzureRmResourceGroupName: '$(TF_BACKEND_RG)'
              backendAzureRmStorageAccountName: '$(TF_BACKEND_SA)'
              backendAzureRmContainerName: '$(TF_BACKEND_CONTAINER)'
              backendAzureRmKey: '$(TF_BACKEND_KEY)'
              commandOptions: '-input=false'

          - task: AzureCLI@2
            displayName: 'Configurer kubeconfig AKS (provider Helm)'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                AKS_RG=$(az aks list --query "[0].resourceGroup" -o tsv 2>/dev/null || true)
                AKS_NAME=$(az aks list --query "[0].name" -o tsv 2>/dev/null || true)
                if [ -n "$AKS_RG" ] && [ -n "$AKS_NAME" ]; then
                  az aks get-credentials --resource-group "$AKS_RG" --name "$AKS_NAME" --overwrite-existing
                fi

          # TerraformTaskV4 apply : applique le plan binaire téléchargé depuis l'artifact
          # -auto-approve car l'approbation humaine a eu lieu via la gate Environment prod
          - task: TerraformTaskV4@4
            displayName: 'terraform apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              environmentServiceNameAzureRM: '$(azureServiceConnection)'
              commandOptions: '-auto-approve $(Pipeline.Workspace)/terraform-plan/tfplan.binary'
