apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:3.0
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: containers-logs
              mountPath: /var/log/containers
              readOnly: true
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: containers-logs
          hostPath:
            path: /var/log/containers
        - name: pods-logs
          hostPath:
            path: /var/log/pods