apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: dev
  labels:
    app: catalogue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalogue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: catalogue
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: catalogue
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.azure.com/agentpool
                    operator: In
                    values:
                      - apps
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: catalogue
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: catalogue
      initContainers:
        - name: sync-db
          image: crformation.azurecr.io/ecommerce-catalogue:2.0
          imagePullPolicy: Always
          command: ["/bin/sh", "-c", "timeout 30 node /app/src/app.js; exit 0"]
          env:
            - name: DB_HOST
              value: "postgres-primary.dev.svc.cluster.local"
            - name: DB_SSL
              value: "true"
            - name: PGSSLMODE
              value: "no-verify"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          envFrom:
            - configMapRef:
                name: catalogue-config
            - secretRef:
                name: catalogue-secret

      containers:
        - name: catalogue
          image: crformation.azurecr.io/ecommerce-catalogue:2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: catalogue-config
            - secretRef:
                name: catalogue-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 4000
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            periodSeconds: 5
            failureThreshold: 3
