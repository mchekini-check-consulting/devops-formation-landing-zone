apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: dev
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        patroni-cluster: postgres-cluster
    spec:
      serviceAccountName: postgres-patroni
      automountServiceAccountToken: true


      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: postgres
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: postgres

      nodeSelector:
        workload: database

      tolerations:
        - key: workload
          operator: Equal
          value: database
          effect: NoSchedule

      containers:
        - name: postgres
          image: ghcr.io/zalando/spilo-16:3.3-p1
          ports:
            - name: postgres
              containerPort: 5432
            - name: patroni
              containerPort: 8008
          env:
            - name: SCOPE
              value: postgres-cluster
            - name: PGROOT
              value: /home/postgres/pgdata
            - name: PATRONI_KUBERNETES_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PATRONI_KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PATRONI_KUBERNETES_LABELS
              value: '{"app": "postgres", "patroni-cluster": "postgres-cluster"}'
            - name: PATRONI_SUPERUSER_USERNAME
              value: postgres
            - name: PGPASSWORD_SUPERUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: PGUSER_STANDBY
              value: replicator
            - name: PGPASSWORD_STANDBY
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: REPLICATION_PASSWORD
            - name: BACKUP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: BACKUP_PASSWORD
            - name: RESTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: RESTORE_PASSWORD
            - name: SPILO_CONFIGURATION
              value: |
                kubernetes:
                  namespace: dev
                  labels:
                    app: postgres
                    patroni-cluster: postgres-cluster
                  scope_label: patroni-cluster
                  role_label: spilo-role
                  use_endpoints: false
                bootstrap:
                  post_init: /patroni-scripts/init-users.sh
                  dcs:
                    ttl: 30
                    loop_wait: 10
                    retry_timeout: 10
                    maximum_lag_on_failover: 1048576
                    postgresql:
                      use_pg_rewind: true
                      parameters:
                        max_connections: 150
                        wal_keep_size: 128MB
                        hot_standby_feedback: on

          startupProbe:
            httpGet:
              path: /liveness
              port: 8008
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /readiness
              port: 8008
            periodSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /liveness
              port: 8008
            periodSeconds: 10
            failureThreshold: 6

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          volumeMounts:
            - name: pgdata
              mountPath: /home/postgres/pgdata
            - name: patroni-scripts
              mountPath: /patroni-scripts

      volumes:
        - name: patroni-scripts
          configMap:
            name: postgres-config
            defaultMode: 0755
            items:
              - key: init-users.sh
                path: init-users.sh

  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: postgres-standard-ssd
        resources:
          requests:
            storage: 2Gi
