apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: dev
data:
  postgresql.conf: |
    wal_level = replica
    max_wal_senders = 10
    wal_keep_size = 128MB
    hot_standby = on
    hot_standby_feedback = on
    listen_addresses = '*'
    max_connections = 100

  pg_hba.conf: |
    local   all             all                                 trust
    host    all             all             127.0.0.1/32        trust
    host    all             all             ::1/128             trust
    host    all             all             10.4.0.0/22         md5
    host    replication     replicator      10.4.0.0/22         md5

  init-users.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
      CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD '${REPLICATION_PASSWORD}';
      CREATE USER backup WITH ENCRYPTED PASSWORD '${BACKUP_PASSWORD}';
      GRANT pg_read_all_data TO backup;
    EOSQL

  liveness-check.sh: |
    #!/bin/bash
    set -e

    pg_isready -U postgres || exit 1

    IS_REPLICA=$(psql -U postgres -tAc "SELECT pg_is_in_recovery();")

    if [ "$IS_REPLICA" = "t" ]; then
      WAL_ACTIVE=$(psql -U postgres -tAc \
        "SELECT count(*) FROM pg_stat_wal_receiver WHERE status IN ('streaming','catchup');")
      if [ "$WAL_ACTIVE" = "0" ]; then
        exit 1
      fi
    fi

    exit 0

  init-replica.sh: |
    #!/bin/bash
    set -e

    if [ "$(hostname)" = "postgres-0" ]; then
      echo "Primary node — skipping basebackup"
      exit 0
    fi

    PRIMARY="postgres-0.postgres.${NAMESPACE}.svc.cluster.local"

    echo "Waiting for primary ${PRIMARY} to be ready..."
    until pg_isready -h "${PRIMARY}" -p 5432 -U postgres; do
      sleep 2
    done

    echo "Cleaning PGDATA before basebackup..."
    rm -rf "${PGDATA:?}"/*

    echo "Starting pg_basebackup from ${PRIMARY}..."
    PGPASSWORD="${REPLICATION_PASSWORD}" pg_basebackup \
      -h "${PRIMARY}" \
      -D "${PGDATA}" \
      -U replicator \
      -P -Xs -R --checkpoint=fast

    echo "Basebackup complete — standby.signal written by -R flag"