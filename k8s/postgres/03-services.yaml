---
# Headless — résolution DNS par pod pour Patroni
# postgres-0.postgres.dev.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: dev
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: patroni
      port: 8008
      targetPort: 8008

---
# Primary — Patroni pose le label spilo-role=master sur le pod élu
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: dev
  labels:
    app: postgres
    role: primary
spec:
  selector:
    app: postgres
    spilo-role: master
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# Replicas — lectures uniquement
apiVersion: v1
kind: Service
metadata:
  name: postgres-read
  namespace: dev
  labels:
    app: postgres
    role: read
spec:
  selector:
    app: postgres
    spilo-role: replica
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
