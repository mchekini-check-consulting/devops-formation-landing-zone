#    schedule: "0 1 * * *"
#    useOwnerReferencesInBackup: false
#    template:
#      ttl: "336h"
#      includedNamespaces:
#        - "*"
#      includeClusterResources: true
#      snapshotVolumes: true

  daily-dev:
    disabled: false
    schedule: "7 18 * * *"
    useOwnerReferencesInBackup: false
    template:
